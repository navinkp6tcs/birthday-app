<!DOCTYPE html>
<html>
<head>
    <title>To my lovely wife ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #ff758c, #ff7eb3);
            font-family: Arial, sans-serif;
            text-align: center;
            color: white;
            overflow: hidden;
        }

        h1 {
            margin-top: 20%;
            font-size: 50px;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px white; }
            to { text-shadow: 0 0 30px yellow; }
        }

        .balloon {
            position: absolute;
            bottom: -100px;
            width: 60px;
            height: 80px;
            background: red;
            border-radius: 50%;
            animation: float 6s infinite ease-in;
        }

        @keyframes float {
            0% { transform: translateY(0); }
            100% { transform: translateY(-100vh); }
        }
    </style>
</head>
<body>

    <h1>🎉 Krishnaja - You are the sun shine of our family ❤️🎂</h1>
    <h2>You are the most beautiful part of life for both Aksh and me. We are so lucky to have you 💕</h2>

    <!-- Background Music -->
    <audio autoplay loop>
        <source src="https://www2.cs.uic.edu/~i101/SoundFiles/HappyBirthday.mid" type="audio/midi">
    </audio>

    <!-- Balloons -->
    <div class="balloon" style="left:10%; background:yellow;"></div>
    <div class="balloon" style="left:30%; background:blue;"></div>
    <div class="balloon" style="left:50%; background:green;"></div>
    <div class="balloon" style="left:70%; background:orange;"></div>
    <div class="balloon" style="left:90%; background:purple;"></div>
<button onclick="speakMessage()" 
        style="padding:15px 30px;
               font-size:18px;
               background:white;
               color:#ff4081;
               border:none;
               border-radius:30px;
               cursor:pointer;
               margin-top:30px;">
    💕 Tap Here for a Special Message 💕
</button>

<script>
function speakMessage() {
    const message = "Hey, Krishna, you are the sunshine of our family. You are the most beautiful part of life for both Aksh and me. We are so lucky to have you. We love you.";

    const speech = new SpeechSynthesisUtterance(message);
    speech.lang = "en-US";
    speech.rate = 0.9;
    speech.pitch = 1.1;
    speech.volume = 1;

    window.speechSynthesis.speak(speech);
}
</script>
</body>

</html>
